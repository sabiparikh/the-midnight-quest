<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Town</title>
<style>
body{background:black;color:white;font-family:Arial,Helvetica,sans-serif;margin:0;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
h1{margin-top:10px}
.box{border:2px solid white;border-radius:10px;padding:15px;margin:20px 0}
button{background:black;color:white;border:2px solid white;padding:12px 18px;margin:8px;border-radius:8px;font-size:16px}
button:disabled{opacity:.4}
#gameOver{display:none;font-size:28px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>Baby Town</h1>
<p>The Baby should stay calm throughout the day and learn new things. Finish all tasks before time or energy runs out.</p>
<div class="box"><p id="stats" style="font-size:28px;font-weight:bold"></p></div>
<div class="box">
<h2 id="question"></h2>
<p id="consequence"></p>
<div id="options"></div>
</div>
<div id="gameOver"><p>GAME OVER</p><button onclick="startGame()">Play Again</button></div>
</div>
<script>
var time,energy,index,gameActive; // time in minutes
function formatTime(mins){var h=Math.floor(mins/60);var m=mins%60;return h+"h "+m+"m";}
var tasks=[
{q:"Baby woke up hungry. What should you do?",c:"Option 1: You do the right thing and lose 30 minutes and 10 pts. Option 2: You lose 1 hour and 20 pts. Option 3: Baby eats but teeth stay dirty so you lose 1 hour and 20 pts.",opts:[
{t:"Make her brush and eat food",time:-30,energy:-10},{t:"Tell her to play",wrong:true},{t:"Make her directly eat",time:-60,energy:-20}
]},
{q:"Bath vs play outside first?",c:"Bath first: Baby gets dirty again and 1 hour and 40 pts are lost. Play first: Bath water gets cold but baby stays clean, lose 1 hour and 10 pts. Neither: Baby does nothing.",opts:[
{t:"Bath first",wrong:true},{t:"Play first",time:-60,energy:-10},{t:"Neither",wrong:true}
]},
{q:"Baby cranky while you want bath?",c:"Take baby out: Baby gets tanned and 1 hour and 40 pts lost. Eat breakfast first: Baby cries and 30 mins and 20 pts lost. Distract then bath: Baby happy, lose 30 mins and 10 pts.",opts:[
{t:"Take the baby out",wrong:true},{t:"Eat breakfast first",wrong:true},{t:"Distract baby then take bath",time:-30,energy:-10}
]},
{q:"Baby crying near nap time?",c:"Distract: Baby overtired, lose 1 hour and 10 pts. Sleep: Lose 1 hour and 30 pts but gain 3 hours and 20 pts. Feed food: Lose 1 hour and 10 pts.",opts:[
{t:"Distract",wrong:true},{t:"Make her sleep",time:120,energy:20},{t:"Feed food",wrong:true}
]},
{q:"Baby woke up hungry before park?",c:"Feed lunch: Lose 30 mins. Park quickly: Lose 1 hour and 10 pts. Sleep again: Lose 30 mins and 10 pts.",opts:[
{t:"Feed her lunch",time:-30,energy:0},{t:"Quickly take her to park",wrong:true},{t:"Make her sleep again",wrong:true}
]},
{q:"Park empty and baby crying?",c:"Play with her: Lose 30 mins and 10 pts. Calm her: Lose 1 hour and 20 pts. Go home: Lose 30 mins and 20 pts.",opts:[
{t:"Play with her",time:-30,energy:-10},{t:"Calm her down",wrong:true},{t:"Go home",wrong:true}
]},
{q:"Dinner and play order?",c:"Dinner then play: Lose 30 mins and gain 30 pts. Play then dinner: Lose 30 mins and 10 pts. Something else: Lose 1 hour and 20 pts.",opts:[
{t:"Dinner then play",time:-30,energy:30},{t:"Play then dinner",wrong:true},{t:"Something else",wrong:true}
]},
{q:"Baby energetic at bedtime?",c:"Sing lullaby: Lose 30 mins and 10 pts. Massage feet: Lose 10 mins and 5 pts. Warm bath: Lose 1 hour and 20 pts.",opts:[
{t:"Sing lullaby",wrong:true},{t:"Massage feet",time:-10,energy:-5},{t:"Warm bath",wrong:true}
]}
];
function startGame(){time=720;energy=300;index=0;gameActive=true;document.getElementById('gameOver').style.display='none';nextTask();}
function updateStats(){document.getElementById('stats').innerHTML="Time Left: "+formatTime(time)+" | Energy: "+energy;}
function nextTask(){if(!gameActive)return;if(index>=tasks.length){endGame(true);return;}updateStats();var task=tasks[index];document.getElementById('question').innerHTML=task.q;document.getElementById('consequence').innerHTML=task.c;var optDiv=document.getElementById('options');optDiv.innerHTML='';for(var i=0;i<task.opts.length;i++){(function(){var o=task.opts[i];var b=document.createElement('button');b.innerHTML=o.t;b.onclick=function(){choose(o);};optDiv.appendChild(b);})();}}
function choose(o){if(!gameActive)return;if(o.wrong){endGame(false);return;}time+=o.time;energy+=o.energy;if(time<=0||energy<=0){endGame(false);return;}index++;nextTask();}
function endGame(win){gameActive=false;var btns=document.querySelectorAll('#options button');for(var i=0;i<btns.length;i++){btns[i].disabled=true;}document.getElementById('gameOver').style.display='block';document.querySelector('#gameOver p').innerHTML= win?"YOU WON":"GAME OVER";}
startGame();
</script>
</body>
</html>
