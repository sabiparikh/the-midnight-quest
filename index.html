<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Midnight Quest</title>
<style>
body{margin:0;background:#1a0033;color:#ccff00;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
#game{text-align:center;padding-top:20px}
h1{color:#39ff14;text-shadow:0 0 15px #39ff14;font-size:64px}
#level{font-size:36px;margin-top:10px}
#question{font-size:38px;margin-top:20px;padding:0 40px}
button{background:#111;color:#39ff14;border:2px solid #39ff14;padding:14px 26px;margin:14px;border-radius:8px;cursor:pointer;font-size:20px}
button:hover{background:#39ff14;color:#000}
#result{font-size:34px;margin-top:25px}
#playAgain{position:fixed;bottom:20px;left:50%;transform:translateX(-50%)}
.house{position:fixed;bottom:0;left:50%;transform:translateX(-50%);opacity:0.2;pointer-events:none;z-index:-1}
</style>
</head>
<body>
<div id="game">
<h1>🌙 The Midnight Quest</h1>
<div id="level"></div>
<div id="question"></div>
<div id="options"></div>
<div id="result"></div>
</div>

<svg class="house" width="600" height="300">
<polygon points="100,250 300,80 500,250" fill="#000"/>
<rect x="150" y="250" width="300" height="200" fill="#000"/>
</svg>

<button id="playAgain" onclick="resetGame()">Play Again</button>

<script>
let step=0,locked=false;

const questions=[
{level:1,q:"It is midnight and the owl is in a happy mood. If you awaken her, you must dance and pay money and competitors will rush in. Do you WAIT and solve her questions OR AWAKEN her?",options:[
{text:"Wait and solve questions",correct:true},
{text:"Awaken the owl",correct:false}
]},
{level:1,q:"You have the map. If you steal it a ghost will haunt you. Do you FOLLOW competitors silently OR STEAL the map?",options:[
{text:"Follow competitors silently",correct:true},
{text:"Steal the map",correct:false}
]},
{level:1,q:"You can go to the dungeons for clues OR you can try and take some mystical books which might have a duplicate map. The books are faster but riskier and the dungeons are slower but easier",options:[
{text:"Go to dungeons",correct:true},
{text:"Take mystical books",correct:false}
]},
{level:2,q:"To use the map, playing music will alert competitors OR making a magic potion and rhyme is safer. What do you do?",options:[
{text:"Magic potion and rhyme",correct:true},
{text:"Play music",correct:false}
]},
{level:2,q:"In the enchanted library, if you leave without speaking to the wizard you will get lost. What do you do?",options:[
{text:"Speak to wizard",correct:true},
{text:"Leave quickly",correct:false}
]},
{level:2,q:"Competitors arrive. Handing over the book or fighting means losing. What is your move?",options:[
{text:"Run away",correct:true},
{text:"Hand over book",correct:false},
{text:"Fight",correct:false}
]},
{level:3,q:"To make the potion, you must summon both witch and ghost. Updating the owl wastes time. Choose wisely.",options:[
{text:"Summon witch and ghost",correct:true},
{text:"Go update owl",correct:false}
]},
{level:3,q:"The potion must not touch the gem. Pouring on the location works but the ritual takes 5 hours. What do you do?",options:[
{text:"Pour on location",correct:true},
{text:"Do ritual",correct:false}
]},
{level:3,q:"Competitors are near. If you wait to steal later a ghost will haunt you. Final move?",options:[
{text:"Grab gem quickly",correct:true},
{text:"Steal later",correct:false}
]}
];

function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function nextQuestion(){

if(step>=questions.length){document.getElementById('result').innerText='You won!!';confetti();return}
let obj=questions[step];
document.getElementById('level').innerText='Level '+obj.level;
document.getElementById('question').innerText=obj.q;
document.getElementById('result').innerText='';
let optDiv=document.getElementById('options');optDiv.innerHTML='';
shuffle(obj.options).forEach(opt=>{
let btn=document.createElement('button');btn.innerText=opt.text;
btn.onclick=()=>choose(opt);
optDiv.appendChild(btn);
});}

function choose(opt){
if(locked) return; locked=true;
if(!opt.correct){document.getElementById('result').innerText='Game Over';return}
confetti();step++;setTimeout(()=>{locked=false;nextQuestion();},1000);
}


function confetti(){
for(let i=0;i<180;i++){
let c=document.createElement('div');
c.style.position='fixed';
c.style.width='8px';
c.style.height='8px';
c.style.background='hsl('+Math.random()*360+',100%,50%)';
c.style.top='-10px';
c.style.left=(50 + (Math.random()*60-30))+'%';
document.body.appendChild(c);
let speed=3+Math.random()*4;
let drift=(Math.random()*6-3);
let fall=setInterval(()=>{
let top=parseFloat(c.style.top);
let left=parseFloat(c.style.left);
c.style.top=(top+speed)+'px';
c.style.left=(left+drift)+'%';
if(top>window.innerHeight){clearInterval(fall);c.remove();}
},20);
}}

function resetGame(){step=0;locked=false;nextQuestion();}
nextQuestion();
</script>
</body>
</html>
